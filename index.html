<!DOCTYPE html>
<html>
<head>
  <title>Monster Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
  <h1>Scan a Barcode</h1>
  <div id="reader" style="width:300px;"></div>
  <script>
    function onScanSuccess(decodedText) {
      window.location.href = "monster-scanner://scan?code=" + decodedText;
    }
   const config = {
  fps: 10,
  qrbox: 250,
  videoConstraints: {
    facingMode: "environment" // 👈 fallback-friendly
  }
};

new Html5QrcodeScanner("reader", config).render(onScanSuccess);
  </script>
</body>
</html>
