<!DOCTYPE html>
<html>
<head>
  <title>Monster Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
  <h1>Scan a Barcode</h1>
  <div id="reader" style="width:300px;"></div>
 <script>
  function onScanSuccess(decodedText, decodedResult) {
    // Redirect to your custom URI with the scanned code
    window.location.href = "monster-scanner://scan?code=" + encodeURIComponent(decodedText);
  }

  const config = {
    fps: 10,
    qrbox: 250,
    videoConstraints: {
      facingMode: "environment"
    }
  };

  const scanner = new Html5QrcodeScanner("reader", config);
  scanner.render(onScanSuccess);
</script>
